version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api
    env_file:
      - apps/api/.env
    ports:
      - 4000:4000
    volumes:
      - ./apps/api:/app/apps/api  # Mount the api application directory
    networks:
      - node-network
  
  react:
    build:
      context: .
      dockerfile: Dockerfile
      target: react
    container_name: react
    env_file:
      - apps/react/.env
    environment:
      - API_URL=http://api:4000/api
    ports:
      - 3001:3001
    depends_on:
      - api
    volumes:
      - ./apps/react:/app/apps/react  # Mount the react application directory
    networks:
      - node-network

networks:
  node-network:
    driver: bridge
